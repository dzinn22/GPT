<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - ZR GPT</title>

<style>
*{box-sizing:border-box}

body{
 margin:0;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
 background:#f7f7fb;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 padding:20px;
}

.card{
 width:100%;
 max-width:420px;
 background:white;
 border-radius:18px;
 border:1px solid #e2e8f0;
 padding:22px;
 box-shadow:0 10px 30px rgba(2,6,23,.08);
}

.logo{
 width:52px;
 height:52px;
 border-radius:16px;
 background:linear-gradient(135deg,#2563eb,#60a5fa);
 display:flex;
 justify-content:center;
 align-items:center;
 color:white;
 font-weight:900;
 font-size:18px;
 margin-bottom:14px;
}

h1{
 margin:0;
 font-size:22px;
 color:#0f172a;
}

p{
 margin-top:8px;
 margin-bottom:18px;
 color:#64748b;
 font-size:14px;
 line-height:1.4;
}

.input{
 width:100%;
 padding:12px;
 border-radius:12px;
 border:1px solid #e2e8f0;
 outline:none;
 font-size:15px;
 margin-bottom:10px;
}

.input:focus{
 border-color:#2563eb;
}

.btn{
 width:100%;
 padding:12px;
 border:none;
 border-radius:12px;
 background:#2563eb;
 color:white;
 font-weight:800;
 cursor:pointer;
 font-size:15px;
}

.btn:hover{background:#1d4ed8}

.btnDark{
 width:100%;
 padding:12px;
 border:none;
 border-radius:12px;
 background:#0f172a;
 color:white;
 font-weight:800;
 cursor:pointer;
 font-size:15px;
 margin-top:10px;
}

.btnDark:hover{background:#111827}

.googleBtn{
 width:100%;
 padding:12px;
 border-radius:12px;
 border:1px solid #e2e8f0;
 background:white;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:10px;
 font-weight:800;
 margin-top:12px;
 font-size:14px;
}

.googleBtn:hover{
 background:#f8fafc;
}

.googleIcon{
 width:22px;
 height:22px;
}

.msg{
 margin-top:12px;
 font-size:13px;
 color:#ef4444;
 font-weight:800;
 display:none;
}

.footer{
 margin-top:16px;
 font-size:13px;
 color:#64748b;
 text-align:center;
}
.footer a{
 color:#2563eb;
 font-weight:800;
 text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">ZR</div>

  <h1>Login no ZR GPT</h1>
  <p>Faça login para salvar seus chats e enviar imagens com segurança.</p>

  <input class="input" id="email" type="email" placeholder="Email">
  <input class="input" id="password" type="password" placeholder="Senha">

  <button class="btn" onclick="loginEmail()">Entrar</button>
  <button class="btnDark" onclick="registerEmail()">Cadastrar</button>

  <button class="googleBtn" onclick="loginGoogle()">
    <img class="googleIcon" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Login com Google
  </button>

  <div class="msg" id="msg"></div>

  <div class="footer">
    Voltar para <a href="/">ZR GPT</a>
  </div>
</div>

<script type="module" src="./auth.js"></script>
</body>
  </html>
