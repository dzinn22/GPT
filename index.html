<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>NeoAssist - IA Jarvis</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

  :root{
    --bg:#0b1220;
    --panel:#0f172a;
    --card:rgba(255,255,255,.04);
    --border:rgba(255,255,255,.08);
    --green:#22c55e;
    --red:#ef4444;
    --text:#fff;
    --muted:rgba(255,255,255,.7);
    --blue:#38bdf8;
  }

  body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
  }

  .app{
    display:flex;
    width:100%;
    height:100dvh;
    overflow:hidden;
    position:relative;
  }

  /* Overlay mobile */
  .overlay{
    display:none;
    position:absolute;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    z-index:9;
  }

  .overlay.show{
    display:block;
  }

  /* Sidebar */
  .sidebar{
    width:300px;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:12px;
    transition:.25s;
    z-index:10;
  }

  .sidebar.hidden{
    transform:translateX(-100%);
    position:absolute;
    left:0;
    top:0;
    height:100dvh;
  }

  .logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:800;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,.03);
  }

  .logo span{color:var(--green)}

  .sectionTitle{
    font-size:12px;
    opacity:.7;
    margin-top:8px;
  }

  .category{
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid var(--border);
    background:rgba(255,255,255,.03);
    transition:.2s;
    font-weight:700;
    user-select:none;
  }

  .category:hover{background:rgba(255,255,255,.06)}
  .category.active{
    border:1px solid var(--green);
    background:rgba(34,197,94,.15);
  }

  .mini{
    font-size:12px;
    opacity:.7;
    margin-top:5px;
    line-height:1.3;
  }

  /* Lista de chats */
  .chatList{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:8px;
    max-height:220px;
    overflow:auto;
    padding-right:4px;
  }

  .chatItem{
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.06);
    background:rgba(255,255,255,.02);
    font-size:13px;
    font-weight:700;
    transition:.2s;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .chatItem:hover{
    background:rgba(255,255,255,.05);
  }

  .chatItem.active{
    border:1px solid var(--blue);
    background:rgba(56,189,248,.15);
  }

  .chatItem span{
    flex:1;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }

  .trashBtn{
    border:none;
    background:transparent;
    color:rgba(255,255,255,.7);
    cursor:pointer;
    font-size:14px;
  }

  .trashBtn:hover{
    color:var(--red);
  }

  .newChatBtn{
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    border:1px dashed rgba(255,255,255,.15);
    background:rgba(255,255,255,.02);
    font-size:13px;
    font-weight:900;
    text-align:center;
    transition:.2s;
    margin-top:6px;
  }

  .newChatBtn:hover{
    background:rgba(255,255,255,.06);
  }

  /* Main */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100dvh;
    overflow:hidden;
  }

  .topbar{
    height:60px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,.02);
  }

  .menuBtn{
    background:transparent;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
  }

  .topbar h2{
    font-size:15px;
    font-weight:800;
  }

  .topbar .status{
    font-size:12px;
    opacity:.7;
    display:flex;
    gap:10px;
    align-items:center;
  }

  .profileCircle{
    width:34px;
    height:34px;
    border-radius:50%;
    background:rgba(34,197,94,.25);
    border:1px solid rgba(34,197,94,.4);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:14px;
    cursor:pointer;
  }

  /* Chat */
  .chat{
    flex:1;
    padding:16px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    scroll-behavior:smooth;
  }

  .msg{
    max-width:900px;
    padding:12px 14px;
    border-radius:14px;
    line-height:1.45;
    font-size:14px;
    white-space:pre-wrap;
    word-break:break-word;
  }

  .user{
    background:rgba(34,197,94,.2);
    border:1px solid rgba(34,197,94,.4);
    align-self:flex-end;
  }

  .bot{
    background:var(--card);
    border:1px solid var(--border);
    align-self:flex-start;
  }

  .typing{
    opacity:.7;
    font-style:italic;
  }

  /* Input fixed bottom */
  .inputArea{
    flex-shrink:0;
    padding:14px;
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
    background:var(--panel);
    align-items:flex-end;
  }

  textarea{
    flex:1;
    resize:none;
    min-height:60px;
    max-height:160px;
    padding:14px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.12);
    background:var(--bg);
    color:white;
    outline:none;
    font-size:15px;
    line-height:1.4;
  }

  .sendBtn{
    width:120px;
    height:60px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-weight:900;
    background:var(--green);
    color:#0b1220;
    transition:.2s;
    font-size:15px;
  }

  .sendBtn:hover{opacity:.85}

  /* Modal */
  .modalBg{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100dvh;
    background:rgba(0,0,0,.65);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:15px;
  }

  .modal{
    width:100%;
    max-width:400px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    box-shadow:0 0 30px rgba(0,0,0,.6);
  }

  .modal h1{
    font-size:20px;
    margin-bottom:5px;
  }

  .modal p{
    font-size:13px;
    opacity:.7;
    margin-bottom:18px;
  }

  .modal input{
    width:100%;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:var(--bg);
    color:white;
    outline:none;
    margin-bottom:12px;
    font-size:14px;
  }

  .modal button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    font-weight:900;
    cursor:pointer;
    background:var(--green);
    color:#0b1220;
    font-size:14px;
  }

  .modal button:hover{opacity:.9}

  .error{
    margin-top:10px;
    color:var(--red);
    font-size:13px;
    font-weight:700;
    display:none;
  }

  .logoutBtn{
    margin-top:10px;
    background:transparent !important;
    border:1px solid rgba(255,255,255,.15) !important;
    color:white !important;
  }

  @media(max-width:900px){
    .sidebar{
      position:absolute;
      left:0;
      top:0;
      height:100dvh;
      width:280px;
    }

    .sendBtn{
      width:90px;
      height:60px;
    }

    textarea{
      font-size:15px;
    }
  }
</style>
</head>

<body>

<!-- LOGIN MODAL -->
<div class="modalBg" id="loginModal">
  <div class="modal">
    <h1>📩 Login NeoAssist</h1>
    <p id="loginText">Digite seu email para receber um código de acesso.</p>

    <input id="emailInput" placeholder="seuemail@gmail.com" />
    <button onclick="sendCode()">Enviar Código</button>

    <div id="codeBox" style="display:none;margin-top:10px;">
      <input id="codeInput" placeholder="Digite o código recebido" />
      <button onclick="verifyCode()">Confirmar Código</button>
    </div>

    <div class="error" id="loginError">Erro.</div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modalBg" id="profileModal" style="display:none;">
  <div class="modal">
    <h1>👤 Conta</h1>
    <p id="profileEmail">Email: ...</p>
    <button class="logoutBtn" onclick="logout()">🚪 Sair da conta</button>
  </div>
</div>

<div class="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar hidden" id="sidebar">
    <div class="logo">🤖 <div>Neo<span>Assist</span></div></div>

    <div class="sectionTitle">CHATS</div>
    <div class="category active" onclick="openCategory('normal')" id="cat-normal">💬 Chat Normal</div>

    <div class="sectionTitle">ESTUDANTES</div>
    <div class="category" onclick="openCategory('exercicios')" id="cat-exercicios">📝 Exercícios</div>
    <div class="category" onclick="openCategory('materias')" id="cat-materias">📚 Matérias</div>
    <div class="category" onclick="openCategory('trabalhos')" id="cat-trabalhos">📄 Trabalhos</div>
    <div class="category" onclick="openCategory('redacao')" id="cat-redacao">✍️ Redação ENEM</div>
    <div class="category" onclick="openCategory('cronograma')" id="cat-cronograma">📅 Cronograma</div>

    <div class="sectionTitle">CONVERSAS</div>
    <div class="chatList" id="chatList"></div>
    <div class="newChatBtn" onclick="createNewChat()">➕ Novo Chat</div>

    <div class="mini" style="margin-top:auto;">⚡ NeoAssist v3.0</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="menuBtn" onclick="toggleSidebar()">☰</button>
      <h2 id="chatTitle">Chat Normal</h2>

      <div class="status">
        <span id="status">🔴 Offline</span>
        <div class="profileCircle" id="profileCircle" onclick="openProfile()">?</div>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="inputArea">
      <textarea id="input" placeholder="Digite sua mensagem..." rows="1"></textarea>
      <button class="sendBtn" onclick="send()">Enviar</button>
    </div>
  </div>

</div>

<script>
  const API_BASE = "https://api-neoassist.onrender.com";

  const CHAT_API = API_BASE + "/api/chat";
  const SEND_CODE_API = API_BASE + "/api/auth/send-code";
  const VERIFY_CODE_API = API_BASE + "/api/auth/verify-code";
  const GET_CHATS_API = API_BASE + "/api/chats";
  const SAVE_CHATS_API = API_BASE + "/api/chats/save";

  let currentCategory = "normal";
  let currentChatId = null;

  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const chatTitle = document.getElementById("chatTitle");
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const status = document.getElementById("status");
  const chatList = document.getElementById("chatList");

  const loginModal = document.getElementById("loginModal");
  const emailInput = document.getElementById("emailInput");
  const codeInput = document.getElementById("codeInput");
  const codeBox = document.getElementById("codeBox");
  const loginError = document.getElementById("loginError");

  const profileModal = document.getElementById("profileModal");
  const profileEmail = document.getElementById("profileEmail");
  const profileCircle = document.getElementById("profileCircle");

  function toggleSidebar(){
    sidebar.classList.toggle("hidden");
    overlay.classList.toggle("show");
  }

  function closeSidebar(){
    sidebar.classList.add("hidden");
    overlay.classList.remove("show");
  }

  function getToken(){
    return localStorage.getItem("neoassist_token");
  }

  function setToken(token){
    localStorage.setItem("neoassist_token", token);
  }

  function setEmail(email){
    localStorage.setItem("neoassist_email", email);
  }

  function getEmail(){
    return localStorage.getItem("neoassist_email");
  }

  function logout(){
    localStorage.removeItem("neoassist_token");
    localStorage.removeItem("neoassist_email");
    localStorage.removeItem("neoassist_data");
    profileModal.style.display = "none";
    loginModal.style.display = "flex";
  }

  function openProfile(){
    profileEmail.textContent = "Email: " + (getEmail() || "???");
    profileModal.style.display = "flex";
  }

  profileModal.addEventListener("click", (e)=>{
    if(e.target === profileModal){
      profileModal.style.display = "none";
    }
  });

  function showLoginError(msg){
    loginError.textContent = msg;
    loginError.style.display = "block";
  }

  function clearLoginError(){
    loginError.style.display = "none";
  }

  // ========================
  // CHAT STORAGE
  // ========================
  function getData(){
    let saved = localStorage.getItem("neoassist_data");
    if(!saved){
      const base = {
        normal: [],
        exercicios: [],
        materias: [],
        trabalhos: [],
        redacao: [],
        cronograma: []
      };
      localStorage.setItem("neoassist_data", JSON.stringify(base));
      return base;
    }
    return JSON.parse(saved);
  }

  function saveData(data){
    localStorage.setItem("neoassist_data", JSON.stringify(data));
  }

  function createChatTitle(text){
    let title = text.trim();
    title = title.replace(/[!?.,]/g,"");
    if(title.length > 35) title = title.slice(0,35) + "...";
    title = title.charAt(0).toUpperCase() + title.slice(1);
    return title;
  }

  function createNewChat(){
    const data = getData();

    const id = Date.now().toString();
    const newChat = {
      id,
      title: "Novo Chat",
      createdAt: new Date().toISOString(),
      messages: []
    };

    data[currentCategory].unshift(newChat);
    saveData(data);

    currentChatId = id;
    renderChatList();
    renderChat();

    syncChatsToServer();
  }

  function deleteChat(chatId){
    const data = getData();
    data[currentCategory] = data[currentCategory].filter(c => c.id !== chatId);
    saveData(data);

    if(currentChatId === chatId){
      currentChatId = null;
    }

    renderChatList();
    renderChat();

    syncChatsToServer();
  }

  function openChat(chatId){
    currentChatId = chatId;
    renderChatList();
    renderChat();

    if(window.innerWidth < 900){
      closeSidebar();
    }
  }

  function openCategory(cat){
    currentCategory = cat;
    currentChatId = null;

    document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
    document.getElementById("cat-" + cat).classList.add("active");

    const titles = {
      normal: "Chat Normal",
      exercicios: "Exercícios",
      materias: "Matérias",
      trabalhos: "Trabalhos",
      redacao: "Redação ENEM",
      cronograma: "Cronograma"
    };

    chatTitle.textContent = titles[cat] || "Chat";

    renderChatList();
    renderChat();

    if(window.innerWidth < 900){
      closeSidebar();
    }
  }

  function renderChatList(){
    chatList.innerHTML = "";

    const data = getData();
    const chats = data[currentCategory] || [];

    if(chats.length === 0){
      chatList.innerHTML = `<div class="mini">Nenhum chat criado ainda.</div>`;
      return;
    }

    chats.forEach(c=>{
      const div = document.createElement("div");
      div.className = "chatItem " + (c.id === currentChatId ? "active" : "");
      div.innerHTML = `
        <span>${c.title}</span>
        <button class="trashBtn" onclick="event.stopPropagation(); deleteChat('${c.id}')">🗑</button>
      `;
      div.onclick = ()=> openChat(c.id);
      chatList.appendChild(div);
    });
  }

  function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function renderChat(){
    chat.innerHTML = "";
    const data = getData();

    let currentChat = data[currentCategory].find(c => c.id === currentChatId);

    if(!currentChat){
      addMessage("Crie um novo chat ou selecione um chat existente.", "bot");
      return;
    }

    if(currentChat.messages.length === 0){
      addMessage("Olá! Eu sou o NeoAssist. Me diga o que você precisa.", "bot");
      return;
    }

    currentChat.messages.forEach(m=>{
      addMessage(m.content, m.role === "user" ? "user" : "bot");
    });

    chat.scrollTop = chat.scrollHeight;
  }

  function autoResize(){
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  }

  input.addEventListener("input", autoResize);

  input.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  function getMode(){
    const modes = {
      normal: "Normal",
      exercicios: "Estudante - Exercícios",
      materias: "Estudante - Matérias",
      trabalhos: "Estudante - Trabalhos",
      redacao: "Estudante - Redação ENEM",
      cronograma: "Estudante - Cronograma"
    };
    return modes[currentCategory] || "Normal";
  }

  // ========================
  // LOGIN EMAIL + CÓDIGO
  // ========================
  async function sendCode(){
    clearLoginError();

    const email = emailInput.value.trim();

    if(!email || !email.includes("@")){
      showLoginError("Digite um email válido.");
      return;
    }

    try{
      const res = await fetch(SEND_CODE_API, {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      if(data.error){
        showLoginError(data.error);
        return;
      }

      codeBox.style.display = "block";
      showLoginError("✅ Código enviado! Verifique seu email.");
      loginError.style.color = "#22c55e";

    }catch(e){
      showLoginError("Erro ao conectar no servidor.");
    }
  }

  async function verifyCode(){
    clearLoginError();
    loginError.style.color = "#ef4444";

    const email = emailInput.value.trim();
    const code = codeInput.value.trim();

    if(!code){
      showLoginError("Digite o código.");
      return;
    }

    try{
      const res = await fetch(VERIFY_CODE_API, {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ email, code })
      });

      const data = await res.json();

      if(data.error){
        showLoginError(data.error);
        return;
      }

      setToken(data.token);
      setEmail(data.email);

      loginModal.style.display = "none";

      updateProfileCircle();
      await loadChatsFromServer();

    }catch(e){
      showLoginError("Erro ao verificar código.");
    }
  }

  function updateProfileCircle(){
    const email = getEmail();
    if(!email){
      profileCircle.textContent = "?";
      return;
    }
    profileCircle.textContent = email.charAt(0).toUpperCase();
  }

  // ========================
  // SYNC CHAT MONGODB
  // ========================
  async function loadChatsFromServer(){
    try{
      const res = await fetch(GET_CHATS_API, {
        headers: {
          "Authorization": "Bearer " + getToken()
        }
      });

      const data = await res.json();

      if(data.error){
        console.log("Erro load chats:", data.error);
        return;
      }

      if(data.chats){
        saveData(data.chats);
      }

      renderChatList();
      renderChat();

    }catch(e){
      console.log("Erro ao carregar chats do servidor.");
    }
  }

  async function syncChatsToServer(){
    try{
      const chats = getData();

      await fetch(SAVE_CHATS_API, {
        method:"POST",
        headers: {
          "Content-Type":"application/json",
          "Authorization": "Bearer " + getToken()
        },
        body: JSON.stringify({ chats })
      });

    }catch(e){
      console.log("Erro ao salvar chats no servidor.");
    }
  }

  // ========================
  // CHAT SEND + TYPING EFFECT
  // ========================
  async function typeEffect(element, text, speed=18){
    element.textContent = "";
    for(let i=0;i<text.length;i++){
      element.textContent += text[i];
      chat.scrollTop = chat.scrollHeight;
      await new Promise(r=>setTimeout(r, speed));
    }
  }

  async function send(){
    const text = input.value.trim();
    if(!text) return;

    if(!getToken()){
      loginModal.style.display = "flex";
      return;
    }

    const data = getData();

    let currentChat = data[currentCategory].find(c => c.id === currentChatId);

    // Se não tiver chat aberto, cria automaticamente
    if(!currentChat){
      createNewChat();
      currentChat = data[currentCategory].find(c => c.id === currentChatId);
    }

    // Se for primeira mensagem do chat -> define título automático
    if(currentChat.messages.length === 0){
      currentChat.title = createChatTitle(text);
    }

    currentChat.messages.push({ role:"user", content:text });
    saveData(data);

    renderChatList();
    renderChat();

    input.value = "";
    autoResize();

    const typingDiv = document.createElement("div");
    typingDiv.className = "msg bot typing";
    typingDiv.textContent = "NeoAssist está pensando...";
    chat.appendChild(typingDiv);
    chat.scrollTop = chat.scrollHeight;

    try{
      const res = await fetch(CHAT_API, {
        method:"POST",
        headers: {
          "Content-Type":"application/json",
          "Authorization": "Bearer " + getToken()
        },
        body: JSON.stringify({
          message: text,
          mode: getMode(),
          history: currentChat.messages
        })
      });

      const resp = await res.json();

      typingDiv.remove();

      if(resp.error){
        addMessage("Erro: " + resp.error, "bot");
        return;
      }

      // cria mensagem vazia e vai digitando
      const botDiv = document.createElement("div");
      botDiv.className = "msg bot";
      chat.appendChild(botDiv);
      chat.scrollTop = chat.scrollHeight;

      await typeEffect(botDiv, resp.reply);

      currentChat.messages.push({ role:"assistant", content: resp.reply });
      saveData(data);

      syncChatsToServer();

    }catch(err){
      typingDiv.remove();
      addMessage("Erro ao conectar no backend. Aguarde e tente novamente.", "bot");
    }
  }

  // ========================
  // CHECK ONLINE
  // ========================
  async function checkOnline(){
    try{
      const res = await fetch(API_BASE + "/health", { cache:"no-store" });
      if(res.ok){
        const data = await res.json();
        if(data.online){
          status.textContent = "🟢 Online";
          return;
        }
      }
      status.textContent = "🔴 Offline";
    }catch(e){
      status.textContent = "🔴 Offline";
    }
  }

  // ========================
  // INIT
  // ========================
  openCategory("normal");
  checkOnline();
  setInterval(checkOnline, 10000);

  updateProfileCircle();

  if(getToken()){
    loginModal.style.display = "none";
    loadChatsFromServer();
  } else {
    loginModal.style.display = "flex";
  }
</script>

</body>
</html>
